<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PizzaNav — Receipt Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e8001d;
    --red-dim: #8a0010;
    --orange: #ff6b00;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* --- NOISE OVERLAY --- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* --- HEADER --- */
  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 2px; width: 60px;
    background: var(--red);
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--red);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .logo-text span {
    color: var(--red);
  }

  .badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* --- MAIN CONTENT --- */
  main {
    flex: 1;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  /* --- STEP INDICATOR --- */
  .steps {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .step-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }

  .step-line {
    flex: 1;
    height: 1px;
    background: var(--border);
    margin: 0 8px;
  }

  .step.active .step-num {
    border-color: var(--red);
    color: var(--red);
    background: rgba(232,0,29,0.1);
  }

  .step.done .step-num {
    border-color: #00c853;
    color: #00c853;
    background: rgba(0,200,83,0.1);
  }

  .step.done .step-label,
  .step.active .step-label { color: var(--text); }

  /* --- SCAN ZONE --- */
  .scan-zone {
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    background: var(--surface);
  }

  .scan-zone:hover, .scan-zone:active {
    border-color: var(--red);
    background: rgba(232,0,29,0.04);
  }

  .scan-zone.has-image {
    border-style: solid;
    border-color: var(--red);
    padding: 0;
  }

  .scan-zone .corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--red);
    border-style: solid;
    opacity: 0.5;
  }
  .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  .scan-icon {
    font-size: 40px;
    filter: grayscale(0.3);
  }

  .scan-title {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 1.5px;
    text-align: center;
  }

  .scan-sub {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    font-family: var(--font-mono);
  }

  #preview {
    width: 100%;
    border-radius: 14px;
    display: none;
    max-height: 280px;
    object-fit: cover;
  }

  #fileInput { display: none; }

  /* --- SCAN BUTTON --- */
  .btn-scan {
    width: 100%;
    padding: 18px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-scan:hover { background: #c8001a; transform: translateY(-1px); }
  .btn-scan:active { transform: translateY(0); }
  .btn-scan:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* --- PROGRESS BAR --- */
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  .progress-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--orange));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* --- RESULT CARD --- */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .result-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .raw-text {
    font-family: var(--font-mono);
    font-size: 11px;
    color: #888;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    max-height: 100px;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.6;
    cursor: pointer;
  }

  .raw-text::-webkit-scrollbar { width: 4px; }
  .raw-text::-webkit-scrollbar-track { background: transparent; }
  .raw-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* --- ADDRESS DISPLAY --- */
  .address-display {
    background: rgba(232,0,29,0.08);
    border: 1px solid rgba(232,0,29,0.3);
    border-radius: 10px;
    padding: 16px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  .address-found-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .address-text {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.5;
  }

  .address-edit {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    display: none;
  }

  .address-edit:focus { border-color: var(--red); }

  .edit-hint {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .edit-hint:hover { color: var(--text); }

  /* --- NAV BUTTON --- */
  .btn-navigate {
    width: 100%;
    padding: 18px;
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--red);
    border-radius: 12px;
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-navigate:hover {
    background: var(--red);
    transform: translateY(-1px);
  }

  /* --- RESET --- */
  .btn-reset {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    padding: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    transition: color 0.2s;
  }

  .btn-reset:hover { color: var(--text); }

  /* --- STATUS CHIP --- */
  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  .status-chip.ok { background: rgba(0,200,83,0.12); color: #00c853; border: 1px solid rgba(0,200,83,0.2); }
  .status-chip.warn { background: rgba(255,107,0,0.12); color: var(--orange); border: 1px solid rgba(255,107,0,0.2); }
  .status-chip.err { background: rgba(232,0,29,0.12); color: var(--red); border: 1px solid rgba(232,0,29,0.2); }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* --- FOOTER --- */
  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-text {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* --- ANIMATIONS --- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .fade-up { animation: fadeUp 0.35s ease forwards; }
  .pulsing { animation: pulse 1.5s ease infinite; }

  @keyframes scanLine {
    0% { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(280px); opacity: 0; }
  }

  .scan-line {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    z-index: 10;
  }

  .scan-zone.scanning .scan-line {
    display: block;
    animation: scanLine 1.5s linear infinite;
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🍕</div>
  <div class="logo-text">PIZZA<span>NAV</span></div>
  <div class="badge">v1.0 · FREE</div>
</header>

<main>

  <!-- Steps -->
  <div class="steps" id="stepsBar">
    <div class="step active" id="step1">
      <div class="step-num">1</div>
      <div class="step-label">Scan</div>
    </div>
    <div class="step-line"></div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <div class="step-label">Extract</div>
    </div>
    <div class="step-line"></div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <div class="step-label">Navigate</div>
    </div>
  </div>

  <!-- Scan Zone -->
  <div class="scan-zone" id="scanZone" onclick="document.getElementById('fileInput').click()">
    <div class="scan-line"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-icon" id="scanIcon">📄</div>
    <div class="scan-title" id="scanTitle">TAP TO SCAN RECEIPT</div>
    <div class="scan-sub" id="scanSub">Take a photo or upload from gallery<br>Works best in good lighting</div>
    <img id="preview" alt="Receipt preview">
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment">

  <!-- Scan Button -->
  <button class="btn-scan" id="btnScan" disabled onclick="startOCR()">
    <span id="btnScanIcon">👁</span>
    <span id="btnScanText">EXTRACT ADDRESS</span>
  </button>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressStatus">Initializing OCR engine...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Result Card -->
  <div class="result-card" id="resultCard">
    <div class="result-label">📋 Extracted Text (tap to copy)</div>
    <div class="raw-text" id="rawText" onclick="copyRaw()"></div>
  </div>

  <!-- Address Display -->
  <div class="address-display" id="addressDisplay">
    <div class="address-found-label">
      <div class="dot"></div>
      ADDRESS DETECTED
      <div id="addressStatus"></div>
    </div>
    <div class="address-text" id="addressText"></div>
    <textarea class="address-edit" id="addressEdit" rows="2" placeholder="Edit address if needed..."></textarea>
    <div class="edit-hint" onclick="toggleEdit()">
      <span id="editHintIcon">✏️</span>
      <span id="editHintText">Edit address manually</span>
    </div>
  </div>

  <!-- Navigate Button -->
  <button class="btn-navigate" id="btnNavigate" onclick="openMaps()">
    🗺️ OPEN IN GOOGLE MAPS
  </button>

  <!-- Reset -->
  <button class="btn-reset" id="btnReset" onclick="resetAll()">
    ↩ scan another receipt
  </button>

</main>

<footer>
  <div class="footer-text">PIZZANAV · OCR POWERED BY TESSERACT.JS</div>
  <div class="footer-text">FREE & OPEN SOURCE</div>
</footer>

<script>
  let extractedAddress = '';
  let isEditing = false;
  let rawOCRText = '';

  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const scanZone = document.getElementById('scanZone');
  const btnScan = document.getElementById('btnScan');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressStatus = document.getElementById('progressStatus');
  const progressPct = document.getElementById('progressPct');
  const resultCard = document.getElementById('resultCard');
  const rawText = document.getElementById('rawText');
  const addressDisplay = document.getElementById('addressDisplay');
  const addressText = document.getElementById('addressText');
  const addressEdit = document.getElementById('addressEdit');
  const btnNavigate = document.getElementById('btnNavigate');
  const btnReset = document.getElementById('btnReset');

  // File selected
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
      preview.src = ev.target.result;
      preview.style.display = 'block';
      document.getElementById('scanIcon').style.display = 'none';
      document.getElementById('scanTitle').style.display = 'none';
      document.getElementById('scanSub').style.display = 'none';
      scanZone.classList.add('has-image');
      scanZone.onclick = null;
      btnScan.disabled = false;
      setStep(1);
    };
    reader.readAsDataURL(file);
  });

  // OCR
  async function startOCR() {
    if (!preview.src || preview.style.display === 'none') return;

    btnScan.disabled = true;
    document.getElementById('btnScanText').textContent = 'SCANNING...';
    document.getElementById('btnScanIcon').textContent = '⏳';
    progressWrap.style.display = 'flex';
    scanZone.classList.add('scanning');
    setStep(2);

    try {
      const worker = await Tesseract.createWorker('eng', 1, {
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round(m.progress * 100);
            progressFill.style.width = pct + '%';
            progressPct.textContent = pct + '%';
            progressStatus.textContent = 'Reading text from receipt...';
          } else if (m.status === 'loading tesseract core') {
            progressStatus.textContent = 'Loading OCR engine...';
          } else if (m.status === 'initializing tesseract') {
            progressStatus.textContent = 'Initializing...';
          } else if (m.status === 'loading language traineddata') {
            progressStatus.textContent = 'Loading language data...';
          } else if (m.status === 'initializing api') {
            progressStatus.textContent = 'Starting up...';
          }
        }
      });

      const result = await worker.recognize(preview.src);
      rawOCRText = result.data.text;
      await worker.terminate();

      scanZone.classList.remove('scanning');
      showResults(rawOCRText);

    } catch (err) {
      scanZone.classList.remove('scanning');
      progressStatus.textContent = '❌ OCR failed. Try again.';
      btnScan.disabled = false;
      document.getElementById('btnScanText').textContent = 'RETRY';
      document.getElementById('btnScanIcon').textContent = '🔄';
    }
  }

  function showResults(text) {
    // Show raw text
    resultCard.style.display = 'flex';
    resultCard.classList.add('fade-up');
    rawText.textContent = text;

    // Try to extract address
    const address = extractAddress(text);
    extractedAddress = address;

    addressDisplay.style.display = 'flex';
    addressDisplay.classList.add('fade-up');

    if (address) {
      addressText.textContent = address;
      addressEdit.value = address;
      document.getElementById('addressStatus').innerHTML =
        '<span class="status-chip ok"><span class="dot"></span>AUTO-DETECTED</span>';
      btnNavigate.style.display = 'flex';
      btnNavigate.classList.add('fade-up');
      setStep(3);
    } else {
      addressText.textContent = 'Could not auto-detect. Please edit manually.';
      addressText.style.color = 'var(--muted)';
      document.getElementById('addressStatus').innerHTML =
        '<span class="status-chip warn"><span class="dot"></span>MANUAL NEEDED</span>';
      toggleEdit(true);
    }

    btnReset.style.display = 'flex';
    progressWrap.style.display = 'none';
    btnScan.style.display = 'none';
  }

  // Address extraction — works well for German/EU addresses (Domino's DE format)
  function extractAddress(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 2);

    // Pattern 1: "Street Name 12\n12345 City"  (German format)
    for (let i = 0; i < lines.length - 1; i++) {
      const streetLine = lines[i];
      const cityLine = lines[i + 1];

      const streetMatch = streetLine.match(/^(.+?)\s+(\d+\s*[a-zA-Z]?)$/);
      const cityMatch = cityLine.match(/^(\d{4,5})\s+(.+)$/);

      if (streetMatch && cityMatch) {
        return `${streetLine}, ${cityLine}`;
      }
    }

    // Pattern 2: Full address on one line with zip
    for (const line of lines) {
      if (/\d{4,5}/.test(line) && line.length > 8 && line.length < 80) {
        if (/[a-zA-ZäöüÄÖÜß]/.test(line)) {
          return line;
        }
      }
    }

    // Pattern 3: Look for "Lieferadresse" or "Delivery" keyword nearby
    for (let i = 0; i < lines.length; i++) {
      const l = lines[i].toLowerCase();
      if (l.includes('liefer') || l.includes('delivery') || l.includes('adresse')) {
        // Try the next 1-2 lines
        const next = lines.slice(i+1, i+4).join(', ');
        if (next.length > 5) return next;
      }
    }

    return null;
  }

  // Toggle manual edit
  function toggleEdit(forceOpen = false) {
    isEditing = forceOpen || !isEditing;
    addressEdit.style.display = isEditing ? 'block' : 'none';
    addressText.style.display = isEditing ? 'none' : 'block';
    document.getElementById('editHintIcon').textContent = isEditing ? '✅' : '✏️';
    document.getElementById('editHintText').textContent = isEditing ? 'Confirm address' : 'Edit address manually';

    if (!isEditing) {
      // Save edit
      extractedAddress = addressEdit.value.trim();
      addressText.textContent = extractedAddress;
      addressText.style.color = 'var(--text)';
      btnNavigate.style.display = 'flex';
      setStep(3);
    }
  }

  // Open Google Maps
  function openMaps() {
    const addr = isEditing ? addressEdit.value.trim() : extractedAddress;
    if (!addr) return;

    const encoded = encodeURIComponent(addr);
    const url = `https://www.google.com/maps/dir/?api=1&destination=${encoded}&travelmode=bicycling`;
    window.open(url, '_blank');
  }

  // Copy raw text
  function copyRaw() {
    if (navigator.clipboard && rawOCRText) {
      navigator.clipboard.writeText(rawOCRText);
      rawText.style.borderColor = 'var(--red)';
      setTimeout(() => rawText.style.borderColor = 'var(--border)', 1000);
    }
  }

  // Reset
  function resetAll() {
    fileInput.value = '';
    preview.src = '';
    preview.style.display = 'none';
    document.getElementById('scanIcon').style.display = 'block';
    document.getElementById('scanTitle').style.display = 'block';
    document.getElementById('scanSub').style.display = 'block';
    scanZone.classList.remove('has-image', 'scanning');
    scanZone.onclick = () => document.getElementById('fileInput').click();
    btnScan.disabled = true;
    btnScan.style.display = 'flex';
    document.getElementById('btnScanText').textContent = 'EXTRACT ADDRESS';
    document.getElementById('btnScanIcon').textContent = '👁';
    progressWrap.style.display = 'none';
    progressFill.style.width = '0%';
    resultCard.style.display = 'none';
    addressDisplay.style.display = 'none';
    btnNavigate.style.display = 'none';
    btnReset.style.display = 'none';
    addressEdit.style.display = 'none';
    addressText.style.display = 'block';
    rawOCRText = '';
    extractedAddress = '';
    isEditing = false;
    setStep(1);
  }

  // Step indicator
  function setStep(n) {
    for (let i = 1; i <= 3; i++) {
      const s = document.getElementById(`step${i}`);
      s.classList.remove('active', 'done');
      if (i < n) s.classList.add('done');
      if (i === n) s.classList.add('active');
    }
  }

  // Update step-num to checkmark when done
  const observer = new MutationObserver(() => {
    for (let i = 1; i <= 3; i++) {
      const s = document.getElementById(`step${i}`);
      const num = s.querySelector('.step-num');
      if (s.classList.contains('done')) num.textContent = '✓';
      else num.textContent = i;
    }
  });
  observer.observe(document.getElementById('stepsBar'), { subtree: true, attributes: true, attributeFilter: ['class'] });
</script>
</body>
